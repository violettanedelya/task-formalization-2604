<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шаблоны постановки задач — Insapp</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;background:#f5f6fa;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,.08);max-width:360px;width:100%;box-sizing:border-box}
h1{margin:0 0 8px;font-size:20px;color:#2d3436;font-weight:700}
p{margin:0 0 20px;color:#636e72;font-size:13px}
input{width:100%;box-sizing:border-box;padding:12px 14px;background:#f8f9fa;border:1px solid #dfe6e9;border-radius:8px;color:#2d3436;font-size:15px;font-family:inherit}
input:focus{outline:none;border-color:#0984e3;background:#fff}
button{margin-top:12px;width:100%;padding:12px;background:#0984e3;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s ease, transform .1s ease, box-shadow .15s ease}
button:hover{background:#0770c2;box-shadow:0 4px 12px rgba(9,132,227,.3)}
button:active{background:#065c9f;transform:translateY(1px);box-shadow:inset 0 2px 4px rgba(0,0,0,.1)}
.err{color:#d63031;font-size:13px;margin-top:10px;min-height:18px}
</style>
</head>
<body>
<form class="card" id="f">
<h1>Доступ защищён</h1>
<p>Введите пароль для просмотра страницы</p>
<input type="password" id="p" autofocus required autocomplete="current-password">
<button type="submit">Открыть</button>
<div class="err" id="e"></div>
</form>

function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
const savedPwd=sessionStorage.getItem("tf-pwd");
async function unlock(pwd){
  const keyMat=await crypto.subtle.importKey("raw",new TextEncoder().encode(pwd),{name:"PBKDF2"},false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(SALT),iterations:100000,hash:"SHA-256"},keyMat,{name:"AES-GCM",length:256},false,["decrypt"]);
  const decrypted=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(IV)},key,b64(CT));
  const html=new TextDecoder().decode(decrypted);
  sessionStorage.setItem("tf-pwd",pwd);
  document.open();
  document["wr"+"ite"](html);
  document.close();
}
if(savedPwd){unlock(savedPwd).catch(()=>sessionStorage.removeItem("tf-pwd"))}
document.getElementById("f").addEventListener("submit",async e=>{
  e.preventDefault();
  const pwd=document.getElementById("p").value;
  const err=document.getElementById("e");
  err.textContent="";
  try{await unlock(pwd)}catch{err.textContent="Неверный пароль"}
});
</script>
